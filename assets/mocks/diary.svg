<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="日記自動記録システム">
  <defs>
    <marker id="dy_arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0b56c9"/>
    </marker>
    <linearGradient id="dy_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fd"/>
    </linearGradient>
  </defs>

  <!-- 左: 00:00 trigger -->
  <g transform="translate(14,28)">
    <circle cx="36" cy="36" r="32" fill="#0b1f3d"/>
    <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
    <text x="36" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">00:00</text>
    <text x="36" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" font-weight="600" fill="rgba(255,255,255,0.7)">Daily trigger</text>
    <!-- 短い針 -->
    <line x1="36" y1="36" x2="36" y2="20" stroke="#5fe0a5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="44" y2="36" stroke="#5fe0a5" stroke-width="1" stroke-linecap="round"/>
    <circle cx="36" cy="36" r="1.5" fill="#5fe0a5"/>

    <text x="36" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">毎日 0時 自動実行</text>
  </g>

  <!-- 中央: 3 系統 API ソース -->
  <g transform="translate(98,16)">
    <text x="50" y="9" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="rgba(11,58,122,0.6)" letter-spacing="2">SOURCES</text>

    <!-- Gmail -->
    <g transform="translate(0,16)">
      <rect x="0" y="0" width="100" height="22" rx="6" fill="#ffffff" stroke="#c7d4ec" stroke-width="0.8"/>
      <g transform="translate(8,5)" stroke="#0b56c9" stroke-width="1.2" fill="none">
        <rect x="0" y="0" width="12" height="8" rx="1"/>
        <path d="M0 0 L6 5 L12 0"/>
      </g>
      <text x="26" y="9" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">Gmail API</text>
      <text x="26" y="17" font-family="system-ui, sans-serif" font-size="6" fill="#5a6484">受信メール</text>
      <circle cx="92" cy="11" r="3" fill="#5fe0a5"/>
    </g>

    <!-- Calendar -->
    <g transform="translate(0,42)">
      <rect x="0" y="0" width="100" height="22" rx="6" fill="#ffffff" stroke="#c7d4ec" stroke-width="0.8"/>
      <g transform="translate(8,4)" stroke="#0b56c9" stroke-width="1.2" fill="none">
        <rect x="0" y="2" width="12" height="10" rx="1"/>
        <line x1="0" y1="5" x2="12" y2="5"/>
        <line x1="3" y1="0" x2="3" y2="3"/>
        <line x1="9" y1="0" x2="9" y2="3"/>
      </g>
      <text x="26" y="9" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">GCal API</text>
      <text x="26" y="17" font-family="system-ui, sans-serif" font-size="6" fill="#5a6484">予定・実績</text>
      <circle cx="92" cy="11" r="3" fill="#5fe0a5"/>
    </g>

    <!-- 通話文字起こし + セッション履歴 -->
    <g transform="translate(0,68)">
      <rect x="0" y="0" width="100" height="22" rx="6" fill="#ffffff" stroke="#c7d4ec" stroke-width="0.8"/>
      <g transform="translate(8,4)" stroke="#0b56c9" stroke-width="1.2" fill="none" stroke-linecap="round">
        <line x1="2" y1="6" x2="2" y2="10"/>
        <line x1="5" y1="3" x2="5" y2="13"/>
        <line x1="8" y1="6" x2="8" y2="10"/>
        <line x1="11" y1="2" x2="11" y2="14"/>
      </g>
      <text x="26" y="9" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">通話 / 履歴</text>
      <text x="26" y="17" font-family="system-ui, sans-serif" font-size="6" fill="#5a6484">Whisper結果</text>
      <circle cx="92" cy="11" r="3" fill="#5fe0a5"/>
    </g>

    <!-- 矢印 -->
    <line x1="50" y1="96" x2="50" y2="116" stroke="#0b56c9" stroke-width="1.5" marker-end="url(#dy_arr)"/>
    <text x="50" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">Claude Code</text>
    <text x="50" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#5a6484">要約 / 整形</text>
    <text x="50" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" fill="#5a6484">セクション分類</text>
  </g>

  <!-- 右: Obsidian 日記 -->
  <g transform="translate(214,16)">
    <rect x="0" y="0" width="92" height="148" rx="6" fill="url(#dy_bg)" stroke="#c7d4ec" stroke-width="1"/>
    <rect x="0" y="0" width="92" height="18" rx="6" fill="#0b3a7a"/>
    <rect x="0" y="12" width="92" height="6" fill="#0b3a7a"/>
    <text x="46" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">2026-04-25.md</text>

    <text x="6" y="30" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">## 仕事</text>
    <line x1="6" y1="34" x2="86" y2="34" stroke="#9aa8c4" stroke-width="0.5"/>
    <line x1="6" y1="40" x2="76" y2="40" stroke="#9aa8c4" stroke-width="0.5"/>
    <line x1="6" y1="46" x2="80" y2="46" stroke="#9aa8c4" stroke-width="0.5"/>

    <text x="6" y="60" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">## 通話</text>
    <line x1="6" y1="64" x2="78" y2="64" stroke="#9aa8c4" stroke-width="0.5"/>
    <line x1="6" y1="70" x2="84" y2="70" stroke="#9aa8c4" stroke-width="0.5"/>

    <text x="6" y="84" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">## メール</text>
    <line x1="6" y1="88" x2="82" y2="88" stroke="#9aa8c4" stroke-width="0.5"/>
    <line x1="6" y1="94" x2="74" y2="94" stroke="#9aa8c4" stroke-width="0.5"/>

    <text x="6" y="108" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">## ToDo</text>
    <g transform="translate(6,114)">
      <rect x="0" y="0" width="6" height="6" rx="1" fill="#0b56c9"/>
      <path d="M1,3 L2.5,4.5 L5,1.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
      <line x1="10" y1="3" x2="76" y2="3" stroke="#9aa8c4" stroke-width="0.6"/>
    </g>
    <g transform="translate(6,124)">
      <rect x="0" y="0" width="6" height="6" rx="1" fill="#0b56c9"/>
      <path d="M1,3 L2.5,4.5 L5,1.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
      <line x1="10" y1="3" x2="68" y2="3" stroke="#9aa8c4" stroke-width="0.6"/>
    </g>

    <rect x="6" y="132" width="80" height="10" rx="3" fill="#eef4fc"/>
    <text x="46" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" font-weight="700" fill="#0b56c9">Obsidian 自動保存</text>
  </g>
</svg>
