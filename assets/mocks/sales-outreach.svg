<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="法人営業自動化">
  <defs>
    <marker id="so_arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7fadee"/>
    </marker>
  </defs>

  <!-- 左: 法人サイト -->
  <g transform="translate(14,16)">
    <rect x="0" y="0" width="80" height="148" rx="8" fill="#ffffff" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <rect x="0" y="0" width="80" height="14" rx="8" fill="#e0e8f5"/>
    <rect x="0" y="6" width="80" height="8" fill="#e0e8f5"/>
    <circle cx="6" cy="7" r="1.5" fill="#ff5959"/>
    <circle cx="11" cy="7" r="1.5" fill="#fbbf24"/>
    <circle cx="16" cy="7" r="1.5" fill="#5fe0a5"/>
    <text x="40" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#5a6484">corp.example.jp</text>
    <!-- 法人サイト中身 -->
    <rect x="6" y="22" width="68" height="22" rx="3" fill="#0b3a7a"/>
    <text x="40" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">事業内容</text>
    <line x1="6" y1="50" x2="74" y2="50" stroke="#c7d4ec" stroke-width="0.7"/>
    <line x1="6" y1="56" x2="68" y2="56" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="62" x2="62" y2="62" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="68" x2="64" y2="68" stroke="#9aa8c4" stroke-width="0.7"/>
    <!-- スキャンライン -->
    <rect x="0" y="80" width="80" height="2" fill="#5fe0a5" opacity="0.85">
      <animate attributeName="y" values="22;130;22" dur="3s" repeatCount="indefinite"/>
    </rect>
    <line x1="6" y1="86" x2="58" y2="86" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="92" x2="64" y2="92" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="98" x2="56" y2="98" stroke="#9aa8c4" stroke-width="0.7"/>

    <rect x="6" y="110" width="68" height="14" rx="3" fill="#eef4fc"/>
    <text x="40" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">マッチ度 92%</text>

    <text x="40" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" font-weight="700" fill="#5a6484">AI Crawl</text>
  </g>

  <!-- 中央: 矢印 + 問い合わせ生成 -->
  <g transform="translate(102,30)">
    <text x="56" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#b8d1f6">問い合わせ文 自動生成</text>
    <rect x="6" y="8" width="100" height="60" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
    <line x1="14" y1="20" x2="98" y2="20" stroke="rgba(255,255,255,0.30)" stroke-width="0.7"/>
    <line x1="14" y1="28" x2="92" y2="28" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="14" y1="36" x2="86" y2="36" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="14" y1="44" x2="96" y2="44" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="14" y1="52" x2="80" y2="52" stroke="rgba(255,255,255,0.22)" stroke-width="0.7"/>
    <line x1="14" y1="60" x2="74" y2="60" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>

    <!-- 矢印 -->
    <line x1="56" y1="80" x2="56" y2="98" stroke="#7fadee" stroke-width="1.5" marker-end="url(#so_arr)"/>

    <text x="56" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#b8d1f6">2チャネル同時送信</text>
  </g>

  <!-- 右: 送信先2チャネル -->
  <g transform="translate(220,16)">
    <!-- フォーム送信 -->
    <g>
      <rect x="0" y="0" width="86" height="68" rx="8" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="6" y="6" width="74" height="10" rx="2" fill="rgba(255,255,255,0.18)"/>
      <text x="43" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">問い合わせ Form</text>
      <rect x="6" y="20" width="74" height="6" rx="2" fill="rgba(255,255,255,0.10)"/>
      <rect x="6" y="29" width="74" height="6" rx="2" fill="rgba(255,255,255,0.10)"/>
      <rect x="6" y="38" width="74" height="20" rx="2" fill="rgba(255,255,255,0.10)"/>
      <rect x="50" y="60" width="30" height="6" rx="3" fill="#5fe0a5"/>
      <text x="65" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="5" font-weight="700" fill="#063e22">SENT</text>
    </g>

    <!-- メール送信 -->
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="86" height="68" rx="8" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <g stroke="#ffffff" stroke-width="1.5" fill="none">
        <rect x="14" y="14" width="58" height="36" rx="4"/>
        <path d="M14 18 L43 38 L72 18"/>
      </g>
      <text x="43" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">Email Direct</text>
      <circle cx="76" cy="14" r="6" fill="#5fe0a5"/>
      <path d="M73 14 L75 16 L79 12" stroke="#063e22" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
