<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="通話記録 自動要約パイプライン">
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fd"/>
    </linearGradient>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0b56c9"/>
    </marker>
  </defs>

  <!-- 左: スマホ録音 -->
  <g transform="translate(14,18)">
    <rect x="0" y="0" width="74" height="144" rx="10" fill="url(#sg1)" stroke="#c7d4ec" stroke-width="1"/>
    <rect x="6" y="6" width="62" height="20" rx="4" fill="#0b3a7a"/>
    <text x="37" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">録音中</text>
    <circle cx="14" cy="16" r="3" fill="#ef5350">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <!-- 波形 -->
    <g stroke="#0b56c9" stroke-width="1.6" stroke-linecap="round">
      <line x1="10" y1="60" x2="10" y2="84"/>
      <line x1="16" y1="50" x2="16" y2="94"/>
      <line x1="22" y1="58" x2="22" y2="86"/>
      <line x1="28" y1="44" x2="28" y2="100"/>
      <line x1="34" y1="54" x2="34" y2="90"/>
      <line x1="40" y1="48" x2="40" y2="96"/>
      <line x1="46" y1="40" x2="46" y2="104"/>
      <line x1="52" y1="56" x2="52" y2="88"/>
      <line x1="58" y1="62" x2="58" y2="82"/>
      <line x1="64" y1="50" x2="64" y2="94"/>
    </g>
    <text x="37" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#5a6484">通話 04:32</text>
    <circle cx="37" cy="132" r="6" fill="#ef5350"/>
  </g>

  <!-- 中央: 処理フロー -->
  <g transform="translate(96,30)">
    <!-- 矢印 1 -->
    <line x1="0" y1="60" x2="22" y2="60" stroke="#0b56c9" stroke-width="1.5" marker-end="url(#arr1)"/>
    <!-- Whisper チップ -->
    <rect x="26" y="44" width="76" height="32" rx="6" fill="#ffffff" stroke="#0b56c9" stroke-width="1.2"/>
    <text x="64" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#0b3a7a">Whisper API</text>
    <text x="64" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#5a6484">音声→文字</text>
    <!-- 矢印 2 -->
    <line x1="106" y1="60" x2="128" y2="60" stroke="#0b56c9" stroke-width="1.5" marker-end="url(#arr1)"/>
    <!-- pyannote -->
    <rect x="0" y="92" width="76" height="24" rx="6" fill="#eef4fc" stroke="#0b56c9" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="38" y="107" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#0b3a7a">pyannote 話者分離</text>
    <line x1="38" y1="76" x2="38" y2="92" stroke="#0b56c9" stroke-width="1" stroke-dasharray="2 2"/>
  </g>

  <!-- 右: Obsidian 要約カード -->
  <g transform="translate(232,18)">
    <rect x="0" y="0" width="74" height="144" rx="6" fill="#ffffff" stroke="#0b56c9" stroke-width="1.2"/>
    <rect x="0" y="0" width="74" height="18" rx="6" fill="#0b56c9"/>
    <rect x="0" y="12" width="74" height="6" fill="#0b56c9"/>
    <text x="37" y="13" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">2026-04-25.md</text>
    <!-- 要約テキスト -->
    <text x="6" y="32" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">要約</text>
    <line x1="6" y1="38" x2="68" y2="38" stroke="#d0ddf5" stroke-width="0.7"/>
    <line x1="6" y1="44" x2="62" y2="44" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="50" x2="58" y2="50" stroke="#9aa8c4" stroke-width="0.7"/>
    <line x1="6" y1="56" x2="64" y2="56" stroke="#9aa8c4" stroke-width="0.7"/>
    <!-- ToDo -->
    <text x="6" y="72" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b3a7a">次のアクション</text>
    <line x1="6" y1="78" x2="68" y2="78" stroke="#d0ddf5" stroke-width="0.7"/>
    <g transform="translate(6,84)">
      <rect x="0" y="0" width="6" height="6" rx="1" fill="#0b56c9"/>
      <path d="M1,3 L2.5,4.5 L5,1.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
      <line x1="10" y1="3" x2="60" y2="3" stroke="#9aa8c4" stroke-width="0.7"/>
    </g>
    <g transform="translate(6,94)">
      <rect x="0" y="0" width="6" height="6" rx="1" fill="#0b56c9"/>
      <path d="M1,3 L2.5,4.5 L5,1.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
      <line x1="10" y1="3" x2="56" y2="3" stroke="#9aa8c4" stroke-width="0.7"/>
    </g>
    <g transform="translate(6,104)">
      <rect x="0" y="0" width="6" height="6" rx="1" fill="#ffffff" stroke="#9aa8c4" stroke-width="0.7"/>
      <line x1="10" y1="3" x2="52" y2="3" stroke="#9aa8c4" stroke-width="0.7"/>
    </g>
    <!-- バッジ -->
    <rect x="6" y="120" width="62" height="16" rx="3" fill="#eef4fc"/>
    <text x="37" y="131" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#0b56c9">累計 264件</text>
  </g>
</svg>
