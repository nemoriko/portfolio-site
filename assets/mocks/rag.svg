<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="RAG基盤" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="rg_glow" cx="50%" cy="40%" r="50%">
      <stop offset="0" stop-color="rgba(125,173,238,0.3)"/>
      <stop offset="1" stop-color="rgba(11,31,72,0)"/>
    </radialGradient>
  </defs>

  <rect width="320" height="320" fill="url(#rg_glow)"/>

  <!-- 上: クエリ入力 -->
  <g transform="translate(40,30)">
    <rect x="0" y="0" width="240" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <circle cx="20" cy="18" r="6" fill="none" stroke="#b8d1f6" stroke-width="1.5"/>
    <line x1="24" y1="22" x2="28" y2="26" stroke="#b8d1f6" stroke-width="1.5" stroke-linecap="round"/>
    <text x="36" y="22" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">"昨日のClaude Codeの会話、なんだっけ"</text>
    <rect x="200" y="10" width="32" height="16" rx="4" fill="#5fe0a5"/>
    <text x="216" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="800" fill="#063e22">SEARCH</text>
  </g>

  <!-- 中央: ハイブリッド検索 -->
  <g transform="translate(40,86)">
    <text x="120" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="2">HYBRID SEARCH</text>

    <!-- 左: FTS5 -->
    <g transform="translate(0,20)">
      <rect x="0" y="0" width="110" height="60" rx="10" fill="rgba(255,255,255,0.10)" stroke="rgba(125,173,238,0.45)" stroke-width="1"/>
      <text x="10" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#b8d1f6">SQLite FTS5</text>
      <text x="10" y="24" font-family="system-ui, sans-serif" font-size="6" fill="rgba(255,255,255,0.6)">全文検索</text>
      <g transform="translate(8,30)" stroke="#b8d1f6" stroke-width="1" fill="none">
        <rect x="0" y="0" width="92" height="3" rx="1.5"/>
        <rect x="0" y="6" width="76" height="3" rx="1.5"/>
        <rect x="0" y="12" width="84" height="3" rx="1.5"/>
        <rect x="0" y="18" width="64" height="3" rx="1.5"/>
      </g>
      <text x="100" y="56" text-anchor="end" font-family="system-ui, sans-serif" font-size="6.5" font-weight="800" fill="#5fe0a5">+0.82</text>
    </g>

    <!-- 右: ベクトル検索 -->
    <g transform="translate(130,20)">
      <rect x="0" y="0" width="110" height="60" rx="10" fill="rgba(255,255,255,0.10)" stroke="rgba(125,173,238,0.45)" stroke-width="1"/>
      <text x="10" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#b8d1f6">sqlite-vec</text>
      <text x="10" y="24" font-family="system-ui, sans-serif" font-size="6" fill="rgba(255,255,255,0.6)">768次元 ベクトル</text>
      <!-- ベクトル可視化 -->
      <g transform="translate(8,30)">
        <circle cx="6" cy="14" r="3" fill="#7fadee"/>
        <circle cx="20" cy="6" r="3" fill="#5fe0a5"/>
        <circle cx="34" cy="18" r="2.5" fill="#7fadee" opacity="0.8"/>
        <circle cx="48" cy="10" r="2" fill="#7fadee" opacity="0.7"/>
        <circle cx="62" cy="14" r="2" fill="#7fadee" opacity="0.7"/>
        <circle cx="76" cy="6" r="2" fill="#7fadee" opacity="0.6"/>
        <circle cx="88" cy="14" r="2" fill="#7fadee" opacity="0.6"/>
        <line x1="6" y1="14" x2="20" y2="6" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
        <line x1="20" y1="6" x2="34" y2="18" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
        <line x1="34" y1="18" x2="48" y2="10" stroke="rgba(255,255,255,0.20)" stroke-width="0.6"/>
        <line x1="48" y1="10" x2="62" y2="14" stroke="rgba(255,255,255,0.20)" stroke-width="0.6"/>
      </g>
      <text x="100" y="56" text-anchor="end" font-family="system-ui, sans-serif" font-size="6.5" font-weight="800" fill="#5fe0a5">+0.91</text>
    </g>

    <!-- 統合 (RRF) -->
    <text x="120" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#b8d1f6">⇩  RRF + 時間減衰  ⇩</text>
  </g>

  <!-- 下: 検索結果 -->
  <g transform="translate(40,210)">
    <rect x="0" y="0" width="240" height="80" rx="10" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <text x="10" y="14" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="rgba(255,255,255,0.6)">RANKED RESULTS</text>

    <g transform="translate(10,22)">
      <rect x="0" y="0" width="220" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>
      <text x="6" y="10" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#5fe0a5">1.</text>
      <text x="18" y="10" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff">Claude Code フック設計の議論 (2026-04-23)</text>
      <text x="200" y="10" font-family="system-ui, sans-serif" font-size="6" font-weight="800" fill="#5fe0a5">0.94</text>
    </g>
    <g transform="translate(10,40)">
      <rect x="0" y="0" width="220" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>
      <text x="6" y="10" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#7fadee">2.</text>
      <text x="18" y="10" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff">RAG 基盤の埋め込みモデル比較 (2026-04-21)</text>
      <text x="200" y="10" font-family="system-ui, sans-serif" font-size="6" font-weight="800" fill="#7fadee">0.78</text>
    </g>
    <g transform="translate(10,58)">
      <rect x="0" y="0" width="220" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>
      <text x="6" y="10" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#7fadee">3.</text>
      <text x="18" y="10" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff">SQLite FTS5 トークナイザ調整メモ</text>
      <text x="200" y="10" font-family="system-ui, sans-serif" font-size="6" font-weight="800" fill="#7fadee">0.71</text>
    </g>
  </g>
</svg>
