<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="X自動いいねエージェント">
  <defs>
    <linearGradient id="xl_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fd"/>
    </linearGradient>
  </defs>

  <!-- 左: タイムライン -->
  <g transform="translate(14,16)">
    <rect x="0" y="0" width="180" height="148" rx="10" fill="url(#xl_bg)" stroke="#c7d4ec" stroke-width="1"/>
    <rect x="0" y="0" width="180" height="22" rx="10" fill="#0b1f3d"/>
    <rect x="0" y="14" width="180" height="8" fill="#0b1f3d"/>
    <text x="10" y="15" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">For you</text>
    <text x="40" y="15" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#9aa8c4">Following</text>

    <!-- ツイート 1: キーワードヒット -->
    <g transform="translate(8,30)">
      <circle cx="9" cy="9" r="9" fill="#0b56c9"/>
      <text x="9" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">A</text>
      <text x="22" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#1a2238">@ai_dev</text>
      <text x="56" y="8" font-family="system-ui, sans-serif" font-size="6" fill="#9aa8c4">2m</text>
      <text x="22" y="18" font-family="system-ui, sans-serif" font-size="6.5" fill="#1a2238">Claude Code で自動化が捗る…</text>
      <rect x="22" y="22" width="36" height="9" rx="2" fill="#fff7ec" stroke="#fbbf24" stroke-width="0.7"/>
      <text x="40" y="28.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#9a6800">Claude</text>
      <!-- ハート -->
      <g transform="translate(140,18)">
        <path d="M5,10 C0,5.5 1,1 5,3 C9,1 10,5.5 5,10 Z" fill="#ef4444"/>
      </g>
      <text x="152" y="26" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#ef4444">Liked</text>
    </g>

    <!-- ツイート 2 -->
    <g transform="translate(8,68)">
      <circle cx="9" cy="9" r="9" fill="#7c3aed"/>
      <text x="9" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">B</text>
      <text x="22" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#1a2238">@llm_eng</text>
      <text x="56" y="8" font-family="system-ui, sans-serif" font-size="6" fill="#9aa8c4">5m</text>
      <text x="22" y="18" font-family="system-ui, sans-serif" font-size="6.5" fill="#1a2238">エージェント実装の話、続き</text>
      <rect x="22" y="22" width="44" height="9" rx="2" fill="#eef4fc" stroke="#0b56c9" stroke-width="0.7"/>
      <text x="44" y="28.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#0b3a7a">エージェント</text>
      <g transform="translate(140,18)">
        <path d="M5,10 C0,5.5 1,1 5,3 C9,1 10,5.5 5,10 Z" fill="#ef4444"/>
      </g>
      <text x="152" y="26" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#ef4444">Liked</text>
    </g>

    <!-- ツイート 3: スキャン中 -->
    <g transform="translate(8,106)">
      <circle cx="9" cy="9" r="9" fill="#5fe0a5"/>
      <text x="9" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#063e22">C</text>
      <text x="22" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#1a2238">@ml_news</text>
      <text x="56" y="8" font-family="system-ui, sans-serif" font-size="6" fill="#9aa8c4">8m</text>
      <text x="22" y="18" font-family="system-ui, sans-serif" font-size="6.5" fill="#1a2238">Whisper の新モデル発表</text>
      <rect x="22" y="22" width="36" height="9" rx="2" fill="#eef4fc" stroke="#0b56c9" stroke-width="0.7"/>
      <text x="40" y="28.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#0b3a7a">Whisper</text>
      <g transform="translate(140,18)">
        <path d="M5,10 C0,5.5 1,1 5,3 C9,1 10,5.5 5,10 Z" fill="none" stroke="#9aa8c4" stroke-width="1"/>
      </g>
      <text x="152" y="26" font-family="system-ui, sans-serif" font-size="6" font-weight="600" fill="#9aa8c4">Scan…</text>
    </g>
  </g>

  <!-- 右: コントロールパネル -->
  <g transform="translate(206,16)">
    <rect x="0" y="0" width="100" height="148" rx="10" fill="#0b1f3d"/>
    <text x="50" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="800" fill="#ffffff">Auto-Like Bot</text>

    <!-- ステータス -->
    <rect x="8" y="30" width="84" height="34" rx="6" fill="#062448"/>
    <circle cx="18" cy="46" r="4" fill="#5fe0a5">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="28" y="42" font-family="system-ui, sans-serif" font-size="7" fill="rgba(255,255,255,0.7)">Status</text>
    <text x="28" y="54" font-family="system-ui, sans-serif" font-size="9" font-weight="800" fill="#5fe0a5">RUNNING</text>

    <!-- キーワード -->
    <text x="8" y="80" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="rgba(255,255,255,0.6)">Keywords</text>
    <g font-family="system-ui, sans-serif" font-size="6.5" font-weight="700">
      <rect x="8" y="84" width="36" height="11" rx="3" fill="rgba(255,255,255,0.10)"/>
      <text x="26" y="92" text-anchor="middle" fill="#b8d1f6">Claude</text>

      <rect x="48" y="84" width="44" height="11" rx="3" fill="rgba(255,255,255,0.10)"/>
      <text x="70" y="92" text-anchor="middle" fill="#b8d1f6">エージェント</text>

      <rect x="8" y="98" width="40" height="11" rx="3" fill="rgba(255,255,255,0.10)"/>
      <text x="28" y="106" text-anchor="middle" fill="#b8d1f6">Whisper</text>

      <rect x="52" y="98" width="40" height="11" rx="3" fill="rgba(255,255,255,0.10)"/>
      <text x="72" y="106" text-anchor="middle" fill="#b8d1f6">+ N…</text>
    </g>

    <line x1="8" y1="116" x2="92" y2="116" stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>

    <!-- 24/7 -->
    <text x="8" y="130" font-family="system-ui, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.6)">Uptime</text>
    <text x="50" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="900" fill="#ffffff">24 / 7</text>
  </g>
</svg>
